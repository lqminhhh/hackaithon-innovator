model:
  base_model: "Qwen/Qwen3.5-4B"
  # auto = bf16 on GPUs that support it, fp16 on GPUs without bf16 support.
  dtype: "auto"
  trust_remote_code: true
  # A100/H100: false = full bf16 LoRA, usually the best first quality run.
  # T4/smaller GPUs: set true for 4-bit QLoRA to avoid OOM.
  load_in_4bit: false
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

data:
  train_path: "data/finetune/qlora_2_5k_v1_train.jsonl"
  val_path: "data/finetune/qlora_2_5k_v1_val.jsonl"
  test_path: "data/finetune/qlora_2_5k_v1_test.jsonl"
  max_seq_length: 1536

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "outputs/finetune/qwen35_4b_lora_2_5k_v1"
  merged_output_dir: "outputs/finetune/qwen35_4b_lora_2_5k_v1_merged"
  num_train_epochs: 2
  learning_rate: 0.0001
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.03
  weight_decay: 0.01
  logging_steps: 10
  eval_steps: 100
  save_steps: 100
  save_total_limit: 2
  gradient_checkpointing: true
  seed: 2026
  report_to: "none"
