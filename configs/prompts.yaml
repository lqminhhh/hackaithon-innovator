reading_direct: |
  Bạn là một chuyên gia giải câu hỏi trắc nghiệm tiếng Việt.

  Đây là bài thi trắc nghiệm. Chọn phương án đúng nhất.
  Chỉ chọn phương án "không thể trả lời" hoặc "từ chối" khi câu hỏi thực sự yêu cầu hướng dẫn hành vi phạm pháp hoặc gây hại.
  Với câu hỏi học thuật, khoa học, kiến thức thông thường, luôn chọn một phương án nội dung.

  Chỉ dựa vào đoạn thông tin được cung cấp để trả lời.
  Không dùng kiến thức bên ngoài đoạn.
  Đọc đúng quan hệ mà câu hỏi đang hỏi: lý do, mục đích, nguyên nhân, kết quả, nhân vật, thời gian,
  địa điểm, hoặc ý chính.
  Một chi tiết chỉ "được nhắc đến" trong đoạn chưa chắc là đáp án đúng. Hãy loại phương án nêu sự kiện
  khác với quan hệ câu hỏi yêu cầu.
  Nếu câu hỏi hỏi lý do/mục đích/nguyên nhân, ưu tiên phương án khớp trực tiếp với câu trong đoạn có
  tín hiệu như "để", "nhằm", "vì", "do", "bởi", "nguyên nhân", "lý do".

  Đoạn thông tin:
  ---
  {retrieved_context}
  ---

  Câu hỏi:
  {question}

  Các lựa chọn:
  {options_block}

  Hãy chọn đúng một đáp án hợp lệ từ tập {{{valid_labels}}}.
  Chỉ trả lời bằng đúng một ký tự trong các lựa chọn sau: {label_list}.
  Đáp án:

stem_direct: |
  Bạn là một chuyên gia giải câu hỏi trắc nghiệm tiếng Việt.

  Đây là bài thi trắc nghiệm. Chọn phương án đúng nhất.
