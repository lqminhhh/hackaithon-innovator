models:
  primary: "Qwen/Qwen3.5-4B"

submission:
  fallback_answer: "A"

question_parsing:
  max_choices: 26

final_inference:
  one_model_only: true
  allow_external_apis: false
  allow_internet: false
  allow_embedding_model: false
  allow_reranker_model: false
  allow_rag: false
  max_model_params_b: 5
  target_vram_gb: 16

inference:
  max_new_tokens: 512
  temperature_deterministic: 0.1
  temperature_sampling: 0.7

confidence_gate:
  fast_exit_threshold: 0.85
  ensemble_threshold: 0.55

consistency_sampler:
  n_initial: 2
  n_second: 5
  n_max: 7

legacy_solver:
  margin_low: 0.15
  sc_n: 5
  temperature: 0.6
  tokens_by_route:
    READING: 512
    STEM: 3072
    KNOWLEDGE: 256
    SAFETY: 128

route_policy:
  margin_low_by_route:
    READING: 0.10
    STEM: 0.15
    KNOWLEDGE: 0.20
    SAFETY: 0.05
  stem_sc:
    high: 3
    low: 7
  default_sc_n: 5
  high_choice_knowledge_sc_n: 3
  high_choice_knowledge_min_choices: 8
  sc_top_p: 0.95
  sc_seed: 1234
  shuffle_options: true
  tokens_by_route:
    READING: 512
    STEM: 3072
    KNOWLEDGE: 256
    SAFETY: 128
  wave2_think_tokens_by_route:
    READING: 2560

quantisation:
  load_in_4bit: true
  compute_dtype: "float16"

vllm:
  gpu_memory_utilization: 0.80
  max_model_len: 4096
  max_num_seqs: 32
  enable_prefix_caching: true
  enable_chunked_prefill: true

safe_vllm:
  gpu_memory_utilization: 0.70
  max_model_len: 4096
  max_num_seqs: 32
  dynamic_headroom_gb: 1.0
  headroom_ladder_gb:
    - 1.0
    - 2.0
    - 3.0
  utilization_clamp_min: 0.50
  utilization_clamp_max: 0.92
  wave_retry_chunk_sizes:
    - 128
    - 64
    - 32
    - 16

runner:
  checkpoint_path: checkpoint.json
  checkpoint_every: 25
  batch: false          # false = sequential MVP (5a); true = phased batch (5b, not yet wired)
  group_by_route: true  # KV-cache-friendly grouping in future phased-batch mode
