models:
  primary: "Qwen/Qwen3.5-4B"

final_inference:
  one_model_only: true
  allow_external_apis: false
  allow_internet: false
  allow_embedding_model: false
  allow_reranker_model: false
  allow_rag: false
  max_model_params_b: 5
  target_vram_gb: 16

inference:
  max_new_tokens: 512
  temperature_deterministic: 0.1
  temperature_sampling: 0.7

confidence_gate:
  fast_exit_threshold: 0.85
  ensemble_threshold: 0.55

consistency_sampler:
  n_initial: 2
  n_second: 5
  n_max: 7

quantisation:
  load_in_4bit: true
  compute_dtype: "float16"

vllm:
  gpu_memory_utilization: 0.80
  max_model_len: 4096
  max_num_seqs: 16
  enable_prefix_caching: true

runner:
  checkpoint_path: checkpoint.json
  checkpoint_every: 25
  batch: false          # false = sequential MVP (5a); true = phased batch (5b, not yet wired)
  group_by_route: true  # KV-cache-friendly grouping in future phased-batch mode
