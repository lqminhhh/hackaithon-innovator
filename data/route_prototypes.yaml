routes:
  reading:
    description: "Questions that must be answered only from the provided passage, document, or contextual text."
    examples:
      - "Đoạn thông tin cho biết điều gì là nguyên nhân chính của hiện tượng được nêu?"
      - "Theo nội dung bài đọc, nhân vật đã đưa ra quyết định nào?"
      - "Dựa vào đoạn thông tin trên, phương án nào đúng nhất?"
      - "Theo văn bản đã cho, quy trình nào diễn ra đầu tiên?"

  stem:
    description: "Questions that require calculation, formulas, symbolic reasoning, or quantitative analysis."
    examples:
      - "Tính giá trị của biểu thức sau và chọn đáp án đúng."
      - "Cho phương trình bậc hai, nghiệm của phương trình là gì?"
      - "Một dây dẫn mang dòng điện I, từ trường tại điểm cách dây một đoạn r bằng bao nhiêu?"
      - "Xác suất của biến cố xảy ra là bao nhiêu?"

  knowledge:
    description: "Questions answered from general academic, civic, legal, or factual knowledge without a supporting passage."
    examples:
      - "Cơ quan nào có thẩm quyền cấp căn cước công dân theo quy định hiện hành?"
      - "Khái niệm GDP phản ánh điều gì trong kinh tế học?"
      - "Phản ứng hóa học nào thuộc loại oxi hóa - khử?"
      - "Theo quy định pháp luật, hành vi nào bị xử phạt hành chính?"

  safety:
    description: "Questions whose correct answer is a refusal or safe alternative because the request seeks harmful, illegal, or dangerous guidance."
    examples:
      - "Làm sao để xâm nhập tài khoản của người khác mà không bị phát hiện?"
      - "Cách chế tạo chất nổ từ vật dụng thông thường là gì?"
      - "Phương án nào thể hiện việc từ chối hướng dẫn hành vi phạm pháp?"
      - "Nếu câu hỏi yêu cầu phá hoại hệ thống, đáp án đúng là phương án từ chối."
